<!DOCTYPE html>
<html>
<head>
    <title>User Form Validation</title>
    <link rel="stylesheet" href="valid.css" />

</head>
<body>

	<script src="valid.js"></script>
    <div class="container-main">
        <h1>User Registration</h1>
        <form method="get" autocomplete="off">
            <div class="container-col">
                <div class="row">
                    <input type="text" id="fname" placeholder="FIRST NAME" onkeyup="validateName(this)" required>
                    <span id="s1"></span>
                </div>
                <div class="row">
                    <input type="text" id="lname" placeholder="LAST NAME" onkeyup="validateName(this)" required>
                    <span id="s2"></span>
                </div>
            </div>

            <div class="container-col">
                <div class="row">
                    <input type="text" id="email" placeholder="EMAIL" onkeyup="validateEmail(this.value)" required>
                    <span id="s3"></span>
                </div>
                <div class="row">
                    <input type="text" id="phone" placeholder="PHONE" onkeyup="validatePhone(this.value)" required>
                    <span id="s4"></span>
                </div>
            </div>

            <div class="container-col">
                <div class="row">
                    <input type="date" id="dob" onblur="validateDob(this.value)" required>
                    <span id="s5"></span>
                </div>
            </div>

            <div class="container-col">
                <div class="row">
                    <input type="password" id="pass" placeholder="PASSWORD" onkeyup="validatePassword(this.value)" required>
                    <span id="s7"></span>
                </div>
            </div>

            <div class="container-col">
                <button type="button" onclick="submitForm()">SUBMIT</button>
            </div>
        </form>
    </div>
</body>
</html>
