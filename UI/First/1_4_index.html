<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>

	<style>
		button {
			padding: 10px;
		}
	</style>
</head>

<body>


	<button onclick="getData(event)"> Get Data</button>


	<script>


		// so to deal with the dates we  do have Date object  given by js 

		// u are creating the date object from the constructor  function 
		//  and it will give u cuurrent date 

		let currentDate = new Date()
		console.log(currentDate)  // gives current date 

		console.log(Date.now())  //  gives current date in miliiseconds 

		//  we will see dates in detail in node js , as some things get changed there 


		//  there are so many methods  tht u can try out here 
		console.log(currentDate.getMinutes())


		// "2025-04-02"  //  so basically this is  string and u  hve to convert to the object 
		//  then use Date  constructor function here 

		console.log(new Date("2025-04-02")) // here the particular string is converted into the date object 


		// ---------------------------------------


		//  math object 

		console.log(Math.random())  // it will genraet random number from 0 to 1 
		console.log(Math.ceil(3.3))  //it will convert it to integere , but next ineteger 
		console.log(Math.floor(3.7)) // it will connver it to  integer , but previos integer 

		//  value, powerr
		console.log(Math.pow(2, 4))

		//  there are so many methods give it a try 
		


		function getData(event) {
			console.log("button is clicked")

			//  fetch is having two parametsr\
			// 1. url that u have to hit
			// 2. options (that we will see later on)
			// fetch api it is nothing but the promise 
			fetch("https://jsonplaceholder.typicode.com/users", {})
				.then((response) => {

					//  here we got the data  but it is  in  binary fomat 
					//  so we have to convert it into readable format 
					//  for that we have to use json method over the response we got 
					console.log("response is : ", response)

					//  this json method  which is responsible to convert data in
					//  readable format is also a promise 
					response.json()
						.then((data) => {

							console.log("we got the final data : ", data)
						})
				})
		}



		//  converting aboe code in async and await 

		async function getAnotherData() {

			try {

				const response = await fetch("https://jsonplaceholder.typicode.com/users", {
					method: "GET", //   it is not mandatory to write optiosn in the case of get method 
				})
				//  post  request
				// const response = await fetch("https://jsonplaceholder.typicode.com/users", {
				// 	method: "POST", //   it is not mandatory to write optiosn in the case of get method 
				// 	headers: {
				// 		"Content-Type": 'application/json'  // for post , put and delete 
				// 	},
				// 	body: { name: "khushal", age: 25 }
				// })
				const data = await response.json();
				console.log("another data is : ", data)
			}
			catch (error) {
				console.log("error occured while fetching : ", error)
			}

		}
	</script>

</body>

</html>
