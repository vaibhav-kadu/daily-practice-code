<!--  

1. Monthly EMI Formula
EMI = (P * R * (1 + R)^N) / ((1 + R)^N - 1)
Explanation:
P = Loan amount (Principal)
R = Monthly interest rate = (annualInterestRate / 12) / 100
N = Loan tenure in months = loanTenureYears * 12

 2. Total Payment
totalPayment = EMI * N

 3. Total Interest
totalInterest = totalPayment - P

-->
